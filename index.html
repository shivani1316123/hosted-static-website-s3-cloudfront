<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop | Online Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        header {
            background: #0a66c2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #004182;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #0a66c2;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #004182;
        }

        footer {
            margin-top: 30px;
            background: #0a66c2;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>MyShop</h1>
    <p>Your Simple Shopping Store</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Products</h2>

    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Product">
            <h3>Product 1</h3>
            <p class="price">₹999</p>
            <button onclick="addToCart('Product 1')">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Product">
            <h3>Product 2</h3>
            <p class="price">₹1499</p>
            <button onclick="addToCart('Product 2')">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Product">
            <h3>Product 3</h3>
            <p class="price">₹799</p>
            <button onclick="addToCart('Product 3')">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Product">
            <h3>Product 4</h3>
            <p class="price">₹1999</p>
            <button onclick="addToCart('Product 4')">Add to Cart</button>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 MyShop</p>
</footer>

<script>
    function addToCart(product) {
        alert(product + " added to cart!");
    }
</script>

</body>
</html>
